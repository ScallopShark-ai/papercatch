name: 每日论文追踪与总结

on:
  # 定时触发（UTC 时间，北京时间 = UTC + 8）
  schedule:
    # UTC 1:00 = 北京时间 9:00，周一到周六运行，周日不跑
    - cron: '0 22 * * 1-5'
  
  # 也可以手动触发（方便调试）
  workflow_dispatch:

jobs:
  fetch-and-summarize:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 2. 配置 Python 环境
      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖
      - name: 安装依赖
        run: |
          pip install arxiv>=2.1.0 openai>=1.0.0 requests>=2.31.0

      # 4. 生成 config.json（从 GitHub Secrets 读取敏感信息）
            # 4. 注入 API Key
      - name: 注入 API Key
        run: |
          sed -i 's|BALALALA|${{ secrets.LLM_API_KEY }}|g' config.json


      # 5. 抓取论文
      - name: 抓取 arXiv 论文
        run: python fetch_papers.py

      # 6. LLM 总结
      - name: LLM 论文总结
        run: python llm_summarize.py

      # 7. 把结果提交回仓库
      - name: 提交结果到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git diff --staged --quiet || git commit -m "📄 $(date +'%Y-%m-%d') 论文追踪更新"
          git push
